      --btn-bg: #eef2f7;

      font-family: 'Georgia', 'Times New Roman', Times, serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      transition: background 0.2s, color 0.2s;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    .top-nav {

      align-items: baseline;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
      flex-wrap: wrap;
    }
    .nav-left { display: flex; align-items: baseline; gap: 0.5rem; }
    .home-button { font-size: 1.2rem; font-weight: bold; background: none; border: none; color: var(--text-primary); cursor: pointer; }
    .nav-divider { color: var(--text-secondary); }
    .current-location { color: var(--text-secondary); }
    .toolbar { display: flex; gap: 0.8rem; align-items: center; }
    .btn-square { background: var(--btn-bg); border: 1px solid var(--border-color); border-radius: 4px; padding: 0.3rem 0.8rem; cursor: pointer; color: var(--text-primary); }
    .accessibility-wrapper { position: relative; }
    .accessibility-toggle {
      background: var(--btn-bg);
      border: 1px solid var(--border-color);
      border-radius: 30px;
      padding: 0.2rem 0.6rem;
      cursor: pointer;
      font-size: 1.2rem;
      filter: grayscale(1) brightness(0.9);
    }
    .accessibility-panel {
      position: absolute; top: 40px; right: 0; width: 320px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.2rem;
      z-index: 900;
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
    }
    .accessibility-panel.show { opacity: 1; visibility: visible; transform: translateY(0); }
    .accessibility-panel h4 { font-size: 1.1rem; margin-bottom: 1rem; text-align: center; }
    .accessibility-panel label { display: block; font-size: 0.85rem; margin: 0.8rem 0 0.3rem; }
    .accessibility-panel input { width: 100%; margin: 0.2rem 0; cursor: pointer; }
    .accessibility-panel select { width: 100%; padding: 0.3rem; margin: 0.2rem 0; background: var(--btn-bg); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 4px; }
    .accessibility-panel button { width: 100%; margin-top: 1rem; padding: 0.4rem; background: var(--btn-bg); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; color: var(--text-primary); }
    .hero { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; gap: 2rem; flex-wrap: wrap; }
    .hero-text h1 { font-size: 3.5rem; }
    .logo-large { max-width: 220px; height: auto; }
    .section-title { font-size: 1.8rem; border-left: 4px solid #5f7f9e; padding-left: 1rem; margin: 2rem 0 1rem; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin: 1.5rem 0; }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.2rem; cursor: pointer; transition: 0.2s; }
    .card:hover { transform: translateY(-2px); border-color: var(--text-secondary); }
    .view-all-btn { display: inline-block; margin: 0.5rem 0 1rem; padding: 0.5rem 1.2rem; background: var(--btn-bg); border: 1px solid var(--border-color); border-radius: 30px; cursor: pointer; }
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);

    }

    .lang-modal { max-width: 400px; text-align: center; }
    .lang-option { position: relative; display: block; width: 100%; margin: 0.5rem 0; padding: 0.5rem; background: var(--btn-bg); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-primary); }
    .lang-welcome { position: absolute; left: 50%; top: -28px; transform: translateX(-50%); background: var(--card-border); padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; white-space: nowrap; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .lang-option:hover .lang-welcome { opacity: 1; }
    .footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid var(--border-color); text-align: center; font-size: 0.8rem; }

    th, td { border: 1px solid var(--border-color); padding: 0.5rem; text-align: left; }

  let currentLang = "en";

  function getDeptName(dept, langCode) {
    if (langCode === "en") return dept.nameEn;
    const map = {
      es: dept.nameEs, pt: dept.namePt, de: dept.nameDe, fr: dept.nameFr, ru: dept.nameRu, mn: dept.nameMn,
      "zh-simple": dept.nameZhSimple, "zh-classical": dept.nameZhClassical,
      "zh-traditional": dept.nameZhTraditional, "zh-huaxia": dept.nameZhHuaxia
    };
    const translated = map[langCode];
    return `${dept.nameEn} (${translated})`;
  }

  function getOtherName(other, langCode) {
    if (langCode === "en") return other.nameEn;
    const map = {
      es: other.nameEs, pt: other.namePt, de: other.nameDe, fr: other.nameFr, ru: other.nameRu, mn: other.nameMn,
      "zh-simple": other.nameZhSimple, "zh-classical": other.nameZhClassical,
      "zh-traditional": other.nameZhTraditional, "zh-huaxia": other.nameZhHuaxia
    };
    const translated = map[langCode];
    return `${other.nameEn} (${translated})`;
  }

  function getDesc(deptOrOther, langCode) {
    if (langCode === "en") return deptOrOther.descEn;
    const map = {
      es: deptOrOther.descEs, pt: deptOrOther.descPt, de: deptOrOther.descDe,
      fr: deptOrOther.descFr, ru: deptOrOther.descRu, mn: deptOrOther.descMn,
      "zh-simple": deptOrOther.descZhSimple, "zh-classical": deptOrOther.descZhClassical,
      "zh-traditional": deptOrOther.descZhTraditional, "zh-huaxia": deptOrOther.descZhHuaxia
    };
    return map[langCode] || deptOrOther.descEn;
  }

  function applyLanguage(langCode) {
    const data = langData[langCode];
    if (!data) return;
    // 页面主内容
    document.getElementById("mainTitle").innerText = data.mainTitle;
    document.getElementById("mainSubtitle").innerText = data.mainSubtitle;
    document.getElementById("aboutTitle").innerText = data.aboutTitle;
    document.getElementById("govTitle").innerText = data.govTitle;
    document.getElementById("otherTitle").innerText = data.otherTitle;
    document.getElementById("viewAllBtn").innerText = data.viewAllBtn;
    document.getElementById("copyrightLine").innerHTML = data.copyrightLine;
    document.getElementById("techSupportLine").innerHTML = data.techSupportLine;
    document.getElementById("nationalLink").innerText = data.nationalLink;
    document.getElementById("themeToggleBtn").innerText = data.themeToggle;
    document.getElementById("langReopenBtn").innerText = data.langToggle;
    window.privacyMsg = data.privacyText;
    window.licenseMsg = data.licenseText;
    // 辅助功能面板文字
    document.getElementById("accessTitle").innerText = data.accessTitle;
    document.getElementById("contrastLabel").innerHTML = `${data.contrastLabel} <span id="contrastVal">${contrastSlider.value}</span>`;
    document.getElementById("grayscaleLabel").innerHTML = `${data.grayscaleLabel} <span id="grayscaleVal">${grayscaleSlider.value}</span>`;
    document.getElementById("saturateLabel").innerHTML = `${data.saturateLabel} <span id="saturateVal">${saturateSlider.value}</span>`;
    document.getElementById("cursorColorLabel").innerText = data.cursorColorLabel;
    document.getElementById("cursorRed").innerText = data.cursorRed;
    document.getElementById("cursorYellow").innerText = data.cursorYellow;
    document.getElementById("cursorEnableLabel").innerText = data.cursorEnableLabel;
    document.getElementById("resetAccessibilityBtn").innerText = data.resetBtn;
    localStorage.setItem("sixside_lang", langCode);
    currentLang = langCode;
    renderHome();
  }

  function renderHome() {
    const data = langData[currentLang];
    const aboutGrid = document.getElementById("aboutGrid");
    aboutGrid.innerHTML = `
      <div class="card"><h3>${data.historyTitle}</h3><p>${data.historyText}</p></div>
      <div class="card"><h3>${data.geographyTitle}</h3><p>${data.geographyText}</p></div>
      <div class="card"><h3>${data.populationTitle}</h3><p>${data.populationText}</p></div>
    `;
    const featuredDepts = document.getElementById("featuredDepts");
    featuredDepts.innerHTML = featuredIds.map(id => {
      const dept = allDepts.find(d => d.id === id);
      return `<div class="card" data-id="${dept.id}"><h3>${getDeptName(dept, currentLang)}</h3><p>${getDesc(dept, currentLang)}</p><p style="margin-top:0.5rem; font-size:0.75rem;">Head: ${dept.head}</p></div>`;
    }).join("");
    const otherGrid = document.getElementById("otherOfficesGrid");
    otherGrid.innerHTML = otherOffices.map(o => `<div class="card"><h3>${getOtherName(o, currentLang)}</h3><p>${getDesc(o, currentLang)}</p><p style="margin-top:0.5rem; font-size:0.75rem;">Head: ${o.head}</p></div>`).join("");
    document.querySelectorAll(".card[data-id]").forEach(card => { card.addEventListener("click", () => showDetail(card.getAttribute("data-id"))); });
  }

  function showDetail(id) {
    const dept = allDepts.find(d => d.id === id);
    if (!dept) return;
    document.getElementById("homeView").style.display = "none";
    const detailDiv = document.getElementById("detailView");
    let extra = "";
    if (id === "sra") extra = `<h3>Tax Rates (selected)</h3><table><thead><tr><th>Item</th><th>Rate</th></tr></thead><tbody><tr><td>Wholemeal bread</td><td>0%</td></tr><tr><td>Sugar / White bread</td><td>22%</td></tr><tr><td>Grass-fed beef</td><td>0%</td></tr><tr><td>Grain-fed beef</td><td>10%</td></tr></tbody></table>`;
    detailDiv.innerHTML = `<div class="detail-section"><div class="back-home" id="backHomeBtn">← Back</div><h2>${getDeptName(dept, currentLang)}</h2><p><strong>Head:</strong> ${dept.head}</p><p>${getDesc(dept, currentLang)}</p>${extra}</div>`;
    detailDiv.style.display = "block";
    document.getElementById("backHomeBtn").onclick = goHome;
    document.getElementById("currentLocation").innerText = getDeptName(dept, currentLang);
  }

  function goHome() {
    document.getElementById("detailView").style.display = "none";
    document.getElementById("homeView").style.display = "block";
    document.getElementById("currentLocation").innerText = "Home";
  }

  function showAllDepartments() {
    const modal = document.createElement("div");
    modal.className = "modal-overlay";
    modal.innerHTML = `<div class="all-depts-modal"><h3>${langData[currentLang].viewAllBtn}</h3><div id="allDeptsList"></div><button class="btn-square" id="closeModalBtn" style="margin-top:1rem;">Close</button></div>`;
    document.body.appendChild(modal);
    const listDiv = modal.querySelector("#allDeptsList");
    listDiv.innerHTML = allDepts.map(d => `<div class="card" data-id="${d.id}" style="margin-bottom:0.8rem;"><h3>${getDeptName(d, currentLang)}</h3><p>${getDesc(d, currentLang)}</p><p>Head: ${d.head}</p></div>`).join("");
    modal.querySelectorAll(".card").forEach(card => { card.addEventListener("click", () => { modal.remove(); showDetail(card.getAttribute("data-id")); }); });
    modal.querySelector("#closeModalBtn").onclick = () => modal.remove();
  }

  function showLangModal() {
    const modal = document.createElement("div");
    modal.className = "modal-overlay";
    let opts = "";
    for (const lang of langOrder) { const d = langData[lang]; opts += `<div class="lang-option" data-lang="${lang}">${d.name}<div class="lang-welcome">${d.welcome}</div></div>`; }
    modal.innerHTML = `<div class="lang-modal"><h3>Select Language</h3>${opts}<button class="btn-square" id="closeLangBtn" style="margin-top:1rem;">Cancel</button></div>`;
    document.body.appendChild(modal);
    modal.querySelectorAll(".lang-option").forEach(opt => { opt.addEventListener("click", () => { applyLanguage(opt.getAttribute("data-lang")); modal.remove(); }); });
    modal.querySelector("#closeLangBtn").onclick = () => modal.remove();
  }

  // 辅助功能控件
  const contrastSlider = document.getElementById("contrastSlider");
  const grayscaleSlider = document.getElementById("grayscaleSlider");
  const saturateSlider = document.getElementById("saturateSlider");
  const contrastVal = document.getElementById("contrastVal");
  const grayscaleVal = document.getElementById("grayscaleVal");
  const saturateVal = document.getElementById("saturateVal");
  let filterTimeout;
  function applyFilters() {
    const c = contrastSlider.value, g = grayscaleSlider.value, s = saturateSlider.value;
    document.body.style.filter = `contrast(${c}) grayscale(${g}) saturate(${s})`;
    contrastVal.innerText = c; grayscaleVal.innerText = g; saturateVal.innerText = s;
  }
  function handleSliderInput() { if (filterTimeout) clearTimeout(filterTimeout); filterTimeout = setTimeout(applyFilters, 16); }
  contrastSlider.addEventListener("input", handleSliderInput);
  grayscaleSlider.addEventListener("input", handleSliderInput);
  saturateSlider.addEventListener("input", handleSliderInput);
  applyFilters();

  const cursorCheckbox = document.getElementById("cursorCheckbox");
  const cursorColorSelect = document.getElementById("cursorColorSelect");
  let cursorActive = false;
  function updateCursor() {
    if (cursorActive) {
      document.body.classList.add("highlight-cursor");
      const color = cursorColorSelect.value;
      document.body.classList.remove("cursor-red", "cursor-yellow");
      document.body.classList.add(`cursor-${color}`);
      document.body.style.cursor = "none";
    } else {
      document.body.classList.remove("highlight-cursor", "cursor-red", "cursor-yellow");
      document.body.style.cursor = "";
    }
  }
  cursorCheckbox.addEventListener("change", (e) => { cursorActive = e.target.checked; updateCursor(); });
  cursorColorSelect.addEventListener("change", () => { if (cursorActive) updateCursor(); });
  document.addEventListener("mousemove", (e) => { if (cursorActive) { document.body.style.setProperty("--mouse-x", e.clientX + "px"); document.body.style.setProperty("--mouse-y", e.clientY + "px"); } });
  document.getElementById("resetAccessibilityBtn").onclick = () => {
    contrastSlider.value = "1"; grayscaleSlider.value = "0"; saturateSlider.value = "1";
    applyFilters();
    cursorCheckbox.checked = false; cursorActive = false; updateCursor();
  };

  document.getElementById("homeBtn").onclick = goHome;
  document.getElementById("viewAllBtn").onclick = showAllDepartments;
  document.getElementById("langReopenBtn").onclick = showLangModal;
  const toggleBtn = document.getElementById("accessibilityToggle");
  const panel = document.getElementById("accessibilityPanel");
  if (toggleBtn && panel) toggleBtn.onclick = () => panel.classList.toggle("show");
  const themeToggleBtn = document.getElementById("themeToggleBtn");
  themeToggleBtn.onclick = () => document.body.classList.toggle("light");
  document.getElementById("privacyLink").onclick = (e) => { e.preventDefault(); alert(window.privacyMsg); };
  document.getElementById("licenseLink").onclick = (e) => { e.preventDefault(); alert(window.licenseMsg); };

  renderHome();
  const savedLang = localStorage.getItem("sixside_lang");
  if (savedLang && langData[savedLang]) applyLanguage(savedLang);
  else applyLanguage("en");
