<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sixside GOV Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #10161f;
            --text-primary: #e8edf5;
            --text-secondary: #9aaebf;
            --border-color: #1f2a36;
            --card-bg: #10161f;
            --card-border: #222c38;
            --btn-bg: #1e2a3a;
        }

        body.light {
            --bg-primary: #f4f6f9;
            --bg-secondary: #ffffff;
            --text-primary: #1a2634;
            --text-secondary: #3a4a5e;
            --border-color: #d0d8e4;
            --card-bg: #ffffff;
            --card-border: #dce2ec;
            --btn-bg: #eef2f7;
        }

        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* 顶部导航栏 */
        .top-nav {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .nav-left {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .home-button {
            font-size: 1.4rem;
            font-weight: bold;
            text-decoration: none;
            color: var(--text-primary);
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-divider {
            color: var(--text-secondary);
            font-size: 1.2rem;
        }
        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .nav-link:hover {
            color: var(--text-primary);
        }
        .toolbar {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .btn-square {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            color: var(--text-primary);
        }
        .accessibility-wrapper { position: relative; }
        .accessibility-toggle {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 0.2rem 0.6rem;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .accessibility-panel {
            position: absolute;
            top: 35px;
            right: 0;
            width: 260px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            z-index: 900;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
        }
        .accessibility-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 页面内容 */
        .hero {
            padding: 2rem 0;
        }
        .hero h1 {
            font-size: 2.5rem;
        }
        .section-title {
            font-size: 1.8rem;
            border-left: 4px solid #5f7f9e;
            padding-left: 1rem;
            margin: 2rem 0 1rem;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: var(--text-secondary);
        }
        .card h3 {
            margin-bottom: 0.5rem;
        }
        .card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .footer {
            margin-top: 3rem;
            padding: 1.5rem 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 0.8rem;
        }
        .detail-section {
            margin: 2rem 0;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }
        .back-home {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <button class="home-button" id="homeBtn">Sixside</button>
        <span class="nav-divider">|</span>
        <a href="#" class="nav-link" data-page="home">主页</a>
        <a href="#" class="nav-link" data-page="pd">警察局</a>
        <a href="#" class="nav-link" data-page="hes">HESS</a>
        <a href="#" class="nav-link" data-page="maffa">MAFFA</a>
    </div>
    <div class="toolbar">
        <div class="accessibility-wrapper">
            <div class="accessibility-toggle" id="accessibilityToggle">♿</div>
            <div class="accessibility-panel" id="accessibilityPanel">
                <h4>辅助功能</h4>
                <label>对比度 <span id="contrastVal">1.0</span></label>
                <input type="range" id="contrastSlider" min="0.5" max="2" step="0.01" value="1">
                <label>灰度 <span id="grayscaleVal">0</span></label>
                <input type="range" id="grayscaleSlider" min="0" max="1" step="0.01" value="0">
                <label>饱和度 <span id="saturateVal">1.0</span></label>
                <input type="range" id="saturateSlider" min="0" max="2" step="0.01" value="1">
                <label><input type="checkbox" id="cursorCheckbox"> 鼠标高亮</label>
                <button id="resetAccessibilityBtn">恢复默认</button>
            </div>
        </div>
        <button class="btn-square" id="themeToggleBtn">深色/浅色</button>
        <button class="btn-square" id="langReopenBtn">语言</button>
    </div>
</div>

<div class="container" id="mainContent">
    <div class="hero" id="homeView">
        <h1>Sixside</h1>
        <p style="font-style: italic;">The Enduring Spirit of the Mountains</p>
        <div class="section-title">Government & Agencies</div>
        <div class="card-grid" id="departmentsGrid"></div>
        <div class="section-title">Other Offices</div>
        <div class="card-grid" id="otherOfficesGrid"></div>
    </div>
    <div id="detailView" style="display: none;"></div>
</div>

<div class="footer">
    <p>© Sixside Provincial Government</p>
    <p>Technical support by Wareflame</p>
    <p><a href="#" id="privacyLink">Privacy Policy</a> | <a href="#" id="licenseLink">License</a></p>
    <p><a href="https://uplgov.github.io/national-portal/" target="_blank">UPL National Portal</a></p>
</div>

<script>
    // 部门数据（独立页面）
    const departments = [
        { id: "governor", name: "Governor's Office", head: "Governor Amina Okonkwo", desc: "Executive leadership, intergovernmental relations, and provincial strategy." },
        { id: "pd", name: "Sixside PD", head: "Chief Marius van der Berg", desc: "Public safety, patrol, crime prevention, and community policing." },
        { id: "pser", name: "Public Safety & Emergency Response", head: "Director Mei Lin", desc: "Firefighting, mountain rescue, ambulance dispatch, disaster coordination." },
        { id: "hes", name: "HESS Office", head: "Minister Fatima Al-Hassan", desc: "Health (HSDS), Education, Social Care, and Family Support." },
        { id: "maffa", name: "MAFFA", head: "Secretary Kenji Tanaka", desc: "Mining, Agriculture, Forestry, Fisheries Administration." },
        { id: "hl", name: "HL Trust", head: "Curator Eleanor Ashworth", desc: "Heritage protection, hiking routes, cultural preservation." }
    ];
    const otherOffices = [
        { name: "Provincial Council", head: "Speaker Janusz Kowalski", desc: "Legislative body, budget approval, citizen representation." },
        { name: "Justice Office", head: "Judge Priya Patel", desc: "Legal affairs, dispute resolution, minor offenses." },
        { name: "Land & Housing Office", head: "Director Carlos Fernández", desc: "Land registry, housing allocation, property rights." },
        { name: "Transport & Infrastructure", head: "Engineer Solveig Haugen", desc: "Roads, public toilets, stations, and port maintenance." }
    ];

    function renderHome() {
        const grid = document.getElementById('departmentsGrid');
        const otherGrid = document.getElementById('otherOfficesGrid');
        grid.innerHTML = departments.map(d => `
            <div class="card" data-id="${d.id}">
                <h3>${d.name}</h3>
                <p>${d.desc.substring(0, 80)}...</p>
                <p style="margin-top:0.5rem; font-size:0.75rem;">Head: ${d.head}</p>
            </div>
        `).join('');
        otherGrid.innerHTML = otherOffices.map(o => `
            <div class="card">
                <h3>${o.name}</h3>
                <p>${o.desc}</p>
                <p style="margin-top:0.5rem; font-size:0.75rem;">Head: ${o.head}</p>
            </div>
        `).join('');
        document.querySelectorAll('.card[data-id]').forEach(card => {
            card.addEventListener('click', () => showDetail(card.getAttribute('data-id')));
        });
    }

    function showDetail(id) {
        const dept = departments.find(d => d.id === id);
        if (!dept) return;
        document.getElementById('homeView').style.display = 'none';
        const detailDiv = document.getElementById('detailView');
        detailDiv.innerHTML = `
            <div class="detail-section">
                <div class="back-home" id="backHomeBtn">← 返回首页</div>
                <h2>${dept.name}</h2>
                <p><strong>Head:</strong> ${dept.head}</p>
                <p>${dept.desc}</p>
                <p>Full operational details and contact information can be found on the internal government portal.</p>
            </div>
        `;
        detailDiv.style.display = 'block';
        document.getElementById('backHomeBtn').onclick = () => {
            detailDiv.style.display = 'none';
            document.getElementById('homeView').style.display = 'block';
        };
    }

    function goHome() {
        document.getElementById('detailView').style.display = 'none';
        document.getElementById('homeView').style.display = 'block';
    }

    // 顶部导航
    document.getElementById('homeBtn').onclick = goHome;
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const page = link.getAttribute('data-page');
            if (page === 'home') goHome();
            else if (page === 'pd') showDetail('pd');
            else if (page === 'hes') showDetail('hes');
            else if (page === 'maffa') showDetail('maffa');
        });
    });

    renderHome();

    // 辅助功能滑块
    const contrastSlider = document.getElementById('contrastSlider');
    const grayscaleSlider = document.getElementById('grayscaleSlider');
    const saturateSlider = document.getElementById('saturateSlider');
    const contrastVal = document.getElementById('contrastVal');
    const grayscaleVal = document.getElementById('grayscaleVal');
    const saturateVal = document.getElementById('saturateVal');
    let filterTimeout;
    function applyFilters() {
        const c = contrastSlider.value;
        const g = grayscaleSlider.value;
        const s = saturateSlider.value;
        document.body.style.filter = `contrast(${c}) grayscale(${g}) saturate(${s})`;
        contrastVal.innerText = c;
        grayscaleVal.innerText = g;
        saturateVal.innerText = s;
    }
    function handleSliderInput() {
        if (filterTimeout) clearTimeout(filterTimeout);
        filterTimeout = setTimeout(applyFilters, 16);
    }
    contrastSlider.addEventListener('input', handleSliderInput);
    grayscaleSlider.addEventListener('input', handleSliderInput);
    saturateSlider.addEventListener('input', handleSliderInput);
    applyFilters();

    const cursorCheckbox = document.getElementById('cursorCheckbox');
    let cursorActive = false;
    function updateCursor() {
        if (cursorActive) {
            document.body.classList.add('highlight-cursor');
            document.body.style.cursor = 'none';
        } else {
            document.body.classList.remove('highlight-cursor');
            document.body.style.cursor = '';
        }
    }
    cursorCheckbox.addEventListener('change', (e) => {
        cursorActive = e.target.checked;
        updateCursor();
    });
    document.addEventListener('mousemove', (e) => {
        if (cursorActive) {
            document.body.style.setProperty('--mouse-x', e.clientX + 'px');
            document.body.style.setProperty('--mouse-y', e.clientY + 'px');
        }
    });

    const resetBtn = document.getElementById('resetAccessibilityBtn');
    if (resetBtn) {
        resetBtn.onclick = () => {
            contrastSlider.value = '1';
            grayscaleSlider.value = '0';
            saturateSlider.value = '1';
            applyFilters();
            cursorCheckbox.checked = false;
            cursorActive = false;
            updateCursor();
        };
    }

    const toggleBtn = document.getElementById('accessibilityToggle');
    const panel = document.getElementById('accessibilityPanel');
    if (toggleBtn && panel) {
        toggleBtn.onclick = () => {
            panel.classList.toggle('show');
        };
    }

    const themeToggleBtn = document.getElementById('themeToggleBtn');
    if (themeToggleBtn) {
        themeToggleBtn.onclick = () => {
            const isLight = document.body.classList.contains('light');
            if (isLight) document.body.classList.remove('light');
            else document.body.classList.add('light');
            localStorage.setItem('sixside_theme', isLight ? 'dark' : 'light');
        };
    }
    const savedTheme = localStorage.getItem('sixside_theme');
    if (savedTheme === 'light') document.body.classList.add('light');
    else if (savedTheme === 'dark') document.body.classList.remove('light');
    else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!prefersDark) document.body.classList.add('light');
    }

    document.getElementById('privacyLink').onclick = (e) => { e.preventDefault(); alert("Privacy Policy: Sixside Government does not collect personal data without consent."); };
    document.getElementById('licenseLink').onclick = (e) => { e.preventDefault(); alert("Website License: © Sixside Provincial Government. All rights reserved."); };
</script>
</body>
</html>
