<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SSPD | Citizen Service Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0f1a; --bg-secondary: #10161f; --text-primary: #e8edf5;
      --text-secondary: #9aaebf; --border-color: #1a2538; --card-bg: #10161f;
      --card-border: #222c38; --btn-bg: #1e2a3a; --accent-red: #cc3333;
      --accent-green: #2ecc71; --accent-amber: #f39c12; --police-blue: #4a6b8c;
      --cursor-color: rgba(204, 51, 51, 0.3); --cursor-border: #cc3333;
      --transition-default: all 0.25s ease-out;
      --transition-smooth: opacity 0.2s ease, transform 0.2s ease;
    }
    body.light {
      --bg-primary: #f4f6f9; --bg-secondary: #ffffff; --text-primary: #1a2634;
      --text-secondary: #3a4a5e; --border-color: #d0d8e4; --card-bg: #ffffff;
      --card-border: #dce2ec; --btn-bg: #eef2f7;
    }
    body { font-family: 'Georgia', serif; background-color: var(--bg-primary); color: var(--text-primary); transition: background 0.3s; overflow-x: hidden; }
    
    #cursor-highlight {
      position: fixed; pointer-events: none; width: 50px; height: 50px;
      border: 2px solid var(--cursor-border); background: var(--cursor-color);
      border-radius: 50%; transform: translate(-50%, -50%); z-index: 10000; display: none;
      transition: opacity 0.1s;
    }
    #cursor-highlight::before, #cursor-highlight::after { content: ''; position: absolute; background: #fff; }
    #cursor-highlight::before { width: 18px; height: 2px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    #cursor-highlight::after { width: 2px; height: 18px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

    .filter-layer { transition: filter 0.2s; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; }
    .nav-brand {
      background: none; border: none; font-weight: bold; letter-spacing: 1px; color: #ffffff;
      cursor: pointer; font-family: inherit; font-size: 1.1rem; padding: 0; outline: none;
      user-select: none;
    }
    .nav-brand span { color: var(--police-blue); font-weight: normal; }
    .nav-tools { display: flex; gap: 15px; align-items: center; }
    .acc-icon-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; filter: grayscale(1) contrast(2); }
    .tool-btn { background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-primary); padding: 5px 15px; cursor: pointer; font-family: inherit; font-size: 0.8rem; transition: var(--transition-default); }
    .tool-btn:hover { background: var(--police-blue); border-color: var(--police-blue); }
    
    .acc-panel { 
      position: absolute; top: 70px; right: 2rem; width: 320px; background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 25px; z-index: 2000; 
      opacity: 0; transform: translateY(-8px); visibility: hidden; transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }
    .acc-panel.show { opacity: 1; transform: translateY(0); visibility: visible; }
    
    .acc-item { margin-bottom: 15px; }
    .acc-item label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; }
    .acc-select, .form-input { width: 100%; padding: 10px; background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); font-family: inherit; }

    .lang-modal { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 2000; 
      display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s;
    }
    .lang-modal.show { opacity: 1; visibility: visible; }
    .lang-grid { 
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; background: var(--bg-secondary); padding: 30px; border: 1px solid var(--border-color);
      transform: scale(0.96); transition: transform 0.2s ease; opacity: 0;
    }
    .lang-modal.show .lang-grid { transform: scale(1); opacity: 1; }
    .lang-btn { background: var(--btn-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px; cursor: pointer; text-align: center; font-family: inherit; transition: var(--transition-default); }
    .lang-btn:hover { background: var(--police-blue); border-color: var(--police-blue); }

    .quick-exit {
      position: fixed; top: 50%; right: 0; transform: translateY(-50%);
      background: var(--accent-red); color: #fff; padding: 20px 8px;
      writing-mode: vertical-rl; text-orientation: mixed; font-weight: bold;
      cursor: pointer; z-index: 9999; border: 2px solid #fff; border-right: none;
      border-radius: 8px 0 0 8px; letter-spacing: 2px; transition: 0.2s; font-family: sans-serif;
    }
    .quick-exit:hover { background: #a00; padding-right: 15px; }

    .header-section { text-align: center; padding: 50px 0 30px; border-bottom: 1px solid var(--border-color); }
    .header-section h1 { font-size: 2.5rem; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
    .header-section p { color: var(--text-secondary); font-style: italic; }
    
    .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin: 40px 0; }
    .service-btn { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-primary); padding: 20px; cursor: pointer; font-family: inherit; font-size: 1.1rem; transition: var(--transition-default); text-align: left; display: flex; justify-content: space-between; align-items: center; }
    .service-btn:hover { border-color: var(--police-blue); background: var(--btn-bg); transform: translateY(-2px); }
    .service-btn::after { content: '→'; color: var(--text-secondary); }

    #selectionView { transition: opacity 0.2s ease; }
    #detailContainer { 
      display: none; margin: 40px 0; background: var(--card-bg); border: 1px solid var(--card-border); padding: 30px;
      opacity: 0; transform: translateY(6px); transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #detailContainer.visible { opacity: 1; transform: translateY(0); }
    .back-btn { background: transparent; color: var(--text-secondary); border: none; cursor: pointer; text-decoration: underline; margin-bottom: 20px; font-family: inherit; font-size: 1rem; transition: color 0.15s; }
    .back-btn:hover { color: var(--police-blue); }
    .red-emergency { color: var(--accent-red); font-weight: bold; border-left: 4px solid var(--accent-red); background: rgba(204,51,51,0.08); padding: 15px; margin-bottom: 20px; }
    .info-card { background: var(--bg-primary); border: 1px solid var(--border-color); padding: 20px; margin-bottom: 20px; border-radius: 4px; line-height: 1.5; }
    .info-card p { margin: 10px 0; }
    .inline-code { font-family: monospace; background: var(--btn-bg); padding: 2px 6px; border-radius: 4px; color: var(--accent-amber); }
    hr { border-color: var(--border-color); margin: 20px 0; }
    footer { text-align: center; padding: 50px; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.85rem; }
    
    .fade-transition { transition: opacity 0.2s, transform 0.2s; }
  </style>
</head>
<body>

<div id="cursor-highlight"></div>
<button class="quick-exit" onclick="quickExit()" data-i18n="leave">LEAVE THIS PAGE</button>

<nav class="top-nav">
  <button class="nav-brand" onclick="window.location.reload()">SIXSIDE <span>| POLICE DEPARTMENT</span></button>
  <div class="nav-tools">
    <button class="acc-icon-btn" onclick="toggleAccPanel()">♿️</button>
    <button class="tool-btn" onclick="document.body.classList.toggle('light')" data-i18n="theme">THEME</button>
    <button class="tool-btn" onclick="openLangModal()" data-i18n="lang">LANGUAGE</button>
  </div>
  <div class="acc-panel" id="accPanel">
    <div class="acc-item"><label data-i18n="acc_contrast">Contrast</label><input type="range" id="con-range" min="0.5" max="2" step="0.1" value="1" oninput="applyFilters()"></div>
    <div class="acc-item"><label data-i18n="acc_grayscale">Grayscale</label><input type="range" id="gray-range" min="0" max="1" step="0.1" value="0" oninput="applyFilters()"></div>
    <div class="acc-item"><label data-i18n="acc_cursor_color">Crosshair Color</label><select id="cursor-color-select" class="acc-select" onchange="updateCursorStyle()"><option value="rgba(204,51,51,0.3)|#cc3333">Red</option><option value="rgba(52,152,219,0.3)|#3498db">Blue</option><option value="rgba(50,205,50,0.3)|#32cd32">Lime</option><option value="rgba(255,255,0,0.3)|#ffff00">Yellow</option></select></div>
    <div class="acc-item"><label style="display:flex; align-items:center; gap:10px; cursor: pointer;"><input type="checkbox" id="cursor-cb" onchange="toggleCursorAssist(this.checked)"> <span data-i18n="acc_enable_cursor">Enable Crosshair Cursor</span></label></div>
  </div>
</nav>

<div class="lang-modal" id="langModal">
  <div class="lang-grid">
    <h3 style="grid-column: 1 / -1; color: #fff; margin-bottom: 15px;" data-i18n="select_lang">Select Language</h3>
    <button class="lang-btn" onclick="setLang('en')">English (UK)</button><button class="lang-btn" onclick="setLang('es')">Español</button>
    <button class="lang-btn" onclick="setLang('zh-Hans')">简体白话</button><button class="lang-btn" onclick="setLang('de')">Deutsch</button>
    <button class="lang-btn" onclick="setLang('pt')">Português</button><button class="lang-btn" onclick="setLang('zh-Hant')">正體官話</button>
    <button class="lang-btn" onclick="setLang('fr')">Français</button><button class="lang-btn" onclick="setLang('zh-Classical')">简体文言</button>
    <button class="lang-btn" onclick="setLang('ru')">Русский</button><button class="lang-btn" onclick="setLang('zh-Huaxia')">華夏文言</button>
    <button class="lang-btn" onclick="setLang('mn')">Монгол</button><button class="lang-btn" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" onclick="setLang('ko')">한국어</button><button class="lang-btn" onclick="setLang('hi')">हिन्दी</button>
    <button class="tool-btn" style="grid-column:1/-1; margin-top:15px;" onclick="closeLangModal()" data-i18n="close">Close</button>
  </div>
</div>

<div class="filter-layer" id="mainFilter">
  <div class="container">
    <div id="selectionView">
      <div class="header-section">
        <h1 data-i18n="portal_title">SSPD CITIZEN SERVICE PORTAL</h1>
        <p data-i18n="portal_sub">Choose a service option below. For life-threatening emergencies, always call 110.</p>
      </div>
      <div class="service-grid" id="serviceGrid"></div>
    </div>
    <div id="detailContainer">
      <button class="back-btn" onclick="goBack()" data-i18n="back">← Back to services</button>
      <div id="dynamicContent"></div>
    </div>
  </div>
</div>
<footer data-i18n="footer">© 2025-2026 SIXSIDE POLICE DEPARTMENT | Citizen Support & Transparency</footer>

  let currentLang = 'en';

  function applyTranslation() {
    const d = dict[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if(d[key]) { if(el.tagName==='INPUT' || el.tagName==='TEXTAREA') el.placeholder=d[key]; else el.innerText=d[key]; }
    });
    renderServices();
  }

  const services = [
    { id:"collision", key:"s1" }, { id:"biometric", key:"s2" }, { id:"case_update", key:"s3" }, { id:"compensation", key:"s4" }, { id:"personal", key:"s5" }
  ];
  function renderServices() {
    const grid = document.getElementById('serviceGrid');
    grid.innerHTML = '';
    const d = dict[currentLang];
    services.forEach(serv => {
      const btn = document.createElement('button');
      btn.className = 'service-btn';
      btn.innerText = d[serv.key];
      btn.onclick = () => openServiceDetail(serv.id);
      grid.appendChild(btn);
    });
  }

  function openServiceDetail(serviceId) {
    const selectionDiv = document.getElementById('selectionView');
    const detailDiv = document.getElementById('detailContainer');
    selectionDiv.style.opacity = '0';
    setTimeout(() => {
      selectionDiv.style.display = 'none';
      detailDiv.style.display = 'block';
      setTimeout(() => { detailDiv.classList.add('visible'); }, 10);
    }, 150);
    const contentDiv = document.getElementById('dynamicContent');
    const d = dict[currentLang];

    if(serviceId === 'collision') {
      contentDiv.innerHTML = `
        <div class="red-emergency"><strong>${d.acc_red_title}</strong><br><br>${d.acc_red_warning}</div>
        <div class="info-card"><p>${d.record_info}</p><p class="inline-code" style="display:inline-block;">C/refXXXXXXXXXXXXX/2025</p></div>
        <div class="info-card"><p>${d.no_record}</p><p class="inline-code">CtempX/refXXXXXXX/2025</p></div>
      `;
    }
    else if(serviceId === 'biometric') {
      contentDiv.innerHTML = `<div class="info-card"><p>${d.biometric_text}</p></div>`;
    }
    else if(serviceId === 'case_update') {
      contentDiv.innerHTML = `<div class="info-card"><p>${d.case_update_text}</p></div>`;
    }
    else if(serviceId === 'compensation') {
      contentDiv.innerHTML = `<div class="info-card"><p>${d.compensation_text}</p></div>`;
    }
    else if(serviceId === 'personal') {
      contentDiv.innerHTML = `<div class="info-card"><p style="color: var(--accent-red); font-weight:bold;">${d.personal_closed}</p></div>`;
    }
    window.scrollTo(0,0);
  }

  function goBack() {
    const detailDiv = document.getElementById('detailContainer');
    const selectionDiv = document.getElementById('selectionView');
    detailDiv.classList.remove('visible');
    setTimeout(() => {
      detailDiv.style.display = 'none';
      selectionDiv.style.display = 'block';
      setTimeout(() => { selectionDiv.style.opacity = '1'; }, 10);
    }, 200);
  }

  function quickExit() { window.open('https://www.google.com', '_blank'); window.location.replace('https://www.bbc.com/news'); }
  
  function toggleAccPanel() { 
    const panel = document.getElementById('accPanel'); 
    panel.classList.toggle('show'); 
  }
  
  function openLangModal() { 
    const modal = document.getElementById('langModal'); 
    modal.classList.add('show'); 
  }
  function closeLangModal() { 
    const modal = document.getElementById('langModal'); 
    modal.classList.remove('show'); 
  }
  
  function applyFilters() { const c=document.getElementById('con-range').value, g=document.getElementById('gray-range').value; document.getElementById('mainFilter').style.filter=`contrast(${c}) grayscale(${g})`; }
  let isMouseOn=false;
  function toggleCursorAssist(on) { isMouseOn=on; const h=document.getElementById('cursor-highlight'); h.style.display=on?'block':'none'; document.body.style.cursor=on?'none':'default'; updateCursorStyle(); }
  function updateCursorStyle() { const [bg,border]=document.getElementById('cursor-color-select').value.split('|'); document.documentElement.style.setProperty('--cursor-color', bg); document.documentElement.style.setProperty('--cursor-border', border); }
  document.addEventListener('mousemove',e=>{ if(!isMouseOn) return; const h=document.getElementById('cursor-highlight'); h.style.left=e.clientX+'px'; h.style.top=e.clientY+'px'; });
  function setLang(l) { currentLang=l; closeLangModal(); applyTranslation(); }

  document.getElementById('selectionView').style.opacity = '1';
  renderServices();
  applyTranslation();
</script>
