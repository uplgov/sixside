<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report a Crime | Sixside Police Department</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #10161f;
      --text-primary: #e8edf5;
      --text-secondary: #9aaebf;
      --border-color: #1a2538;
      --card-bg: #10161f;
      --card-border: #222c38;
      --btn-bg: #1e2a3a;
      --accent-red: #cc3333;
      --accent-green: #2ecc71;
      --accent-amber: #f39c12;
      --police-blue: #4a6b8c;
      --cursor-color: rgba(204, 51, 51, 0.3);
      --cursor-border: #cc3333;
    }
    body.light {
      --bg-primary: #f4f6f9; --bg-secondary: #ffffff; --text-primary: #1a2634;
      --text-secondary: #3a4a5e; --border-color: #d0d8e4; --card-bg: #ffffff;
      --card-border: #dce2ec; --btn-bg: #eef2f7;
    }
    body { font-family: 'Georgia', serif; background-color: var(--bg-primary); color: var(--text-primary); transition: background 0.3s; overflow-x: hidden; }
    
    /* 核心：带白色十字架的高亮鼠标 */
    #cursor-highlight {
      position: fixed; pointer-events: none; width: 50px; height: 50px;
      border: 2px solid var(--cursor-border); background: var(--cursor-color);
      border-radius: 50%; transform: translate(-50%, -50%); z-index: 10000; display: none;
    }
    #cursor-highlight::before, #cursor-highlight::after { content: ''; position: absolute; background: #fff; }
    #cursor-highlight::before { width: 18px; height: 2px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    #cursor-highlight::after { width: 2px; height: 18px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

    .filter-layer { transition: filter 0.2s; }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }

    /* 导航栏 */
    .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; }
    .nav-brand { font-weight: bold; letter-spacing: 1px; color: #ffffff; cursor: pointer; }
    .nav-brand span { color: var(--police-blue); font-weight: normal; }

    .nav-tools { display: flex; gap: 15px; align-items: center; }
    .acc-icon-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; filter: grayscale(1) contrast(2); }
    .tool-btn { background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-primary); padding: 5px 15px; cursor: pointer; font-family: inherit; font-size: 0.8rem; }

    /* 辅助面板 */
    .acc-panel { position: absolute; top: 70px; right: 2rem; width: 320px; background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 25px; z-index: 2000; display: none; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
    .acc-panel.show { display: block; }
    .acc-item { margin-bottom: 15px; }
    .acc-item label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; }
    .acc-select, .form-input { width: 100%; padding: 10px; background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); font-family: inherit; }

    /* 语言模态框 */
    .lang-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; background: var(--bg-secondary); padding: 30px; border: 1px solid var(--border-color); }
    .lang-btn { background: var(--btn-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px; cursor: pointer; text-align: center; }

    /* 快速离开按钮 (Right side quick exit) */
    .quick-exit {
      position: fixed; top: 50%; right: 0; transform: translateY(-50%);
      background: var(--accent-red); color: #fff; padding: 20px 8px;
      writing-mode: vertical-rl; text-orientation: mixed; font-weight: bold;
      cursor: pointer; z-index: 9999; border: 2px solid #fff; border-right: none;
      border-radius: 8px 0 0 8px; letter-spacing: 2px; transition: 0.2s;
    }
    .quick-exit:hover { background: #a00; padding-right: 15px; }

    /* 页面主体内容 */
    .header-section { text-align: center; padding: 50px 0 30px; border-bottom: 1px solid var(--border-color); }
    .header-section h1 { font-size: 2.5rem; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
    .header-section p { color: var(--text-secondary); font-style: italic; }
    .header-notice { display: inline-block; background: rgba(243, 156, 18, 0.1); border-left: 3px solid var(--accent-amber); padding: 10px 20px; margin-top: 20px; font-size: 0.9rem; color: var(--accent-amber); }

    /* 分类网格 */
    .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin: 40px 0; }
    .cat-btn { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-primary); padding: 20px; cursor: pointer; font-family: inherit; font-size: 1.1rem; transition: 0.2s; text-align: left; display: flex; justify-content: space-between; align-items: center; }
    .cat-btn:hover { border-color: var(--police-blue); background: var(--btn-bg); transform: translateY(-2px); }
    .cat-btn::after { content: '→'; color: var(--text-secondary); }

    /* 报告表单容器 */
    #reportFormContainer { display: none; margin: 40px 0; background: var(--card-bg); border: 1px solid var(--card-border); padding: 30px; }
    .back-btn { background: transparent; color: var(--text-secondary); border: none; cursor: pointer; text-decoration: underline; margin-bottom: 20px; font-family: inherit; }
    
    .emergency-warning { background: rgba(204,51,51,0.1); border: 2px solid var(--accent-red); padding: 20px; margin-bottom: 30px; }
    .emergency-warning h3 { color: var(--accent-red); margin-bottom: 10px; font-size: 1.1rem; }
    .emergency-warning ul { margin-left: 20px; color: var(--text-primary); font-size: 0.95rem; margin-bottom: 15px; }
    .emergency-warning p { color: var(--text-secondary); font-size: 0.9rem; }

    .fatal-warning { text-align: center; padding: 40px 20px; }
    .fatal-warning h2 { color: var(--accent-red); margin-bottom: 15px; font-size: 2rem; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem; }
    textarea.form-input { resize: vertical; min-height: 100px; }
    .submit-btn { width: 100%; background: var(--police-blue); color: #fff; border: none; padding: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 20px; }

    footer { text-align: center; padding: 50px; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.85rem; }
  </style>
</head>
<body>

<div id="cursor-highlight"></div>

<button class="quick-exit" onclick="quickExit()" title="Leave this page immediately">LEAVE THIS PAGE</button>

<nav class="top-nav">
  <div class="nav-brand" onclick="location.reload()">SIXSIDE <span>| POLICE DEPARTMENT</span></div>
  <div class="nav-tools">
    <button class="acc-icon-btn" onclick="toggleAccPanel()">♿️</button>
    <button class="tool-btn" onclick="document.body.classList.toggle('light')">THEME</button>
    <button class="tool-btn" onclick="document.getElementById('langModal').style.display='flex'">LANGUAGE</button>
  </div>

  <div class="acc-panel" id="accPanel">
    <div class="acc-item"><label>Contrast</label><input type="range" id="con-range" min="0.5" max="2" step="0.1" value="1" oninput="applyFilters()"></div>
    <div class="acc-item"><label>Grayscale</label><input type="range" id="gray-range" min="0" max="1" step="0.1" value="0" oninput="applyFilters()"></div>
    <div class="acc-item">
      <label>Crosshair Color</label>
      <select id="cursor-color-select" class="acc-select" onchange="updateCursorStyle()">
        <option value="rgba(204,51,51,0.3)|#cc3333">Red</option>
        <option value="rgba(52,152,219,0.3)|#3498db">Blue</option>
        <option value="rgba(50,205,50,0.3)|#32cd32">Lime</option>
        <option value="rgba(255,255,0,0.3)|#ffff00">Bright Yellow</option>
      </select>
    </div>
    <div class="acc-item">
      <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
        <input type="checkbox" id="cursor-cb" onchange="toggleCursorAssist(this.checked)"> Enable Crosshair Cursor
      </label>
    </div>
  </div>
</nav>

<div class="lang-modal" id="langModal">
  <div class="lang-grid">
    <h3 style="grid-column: 1 / -1; color: #fff; margin-bottom: 15px;">Select Language</h3>
    <button class="lang-btn" onclick="setLang('en')">English (UK)</button>
    <button class="lang-btn">Español</button>
    <button class="lang-btn" onclick="setLang('zh-Hans')">简体白话</button>
    <button class="lang-btn">Deutsch</button>
    <button class="lang-btn">Português</button>
    <button class="lang-btn">正體官話</button>
    <button class="lang-btn">Français</button>
    <button class="lang-btn">简体文言</button>
    <button class="lang-btn">Русский</button>
    <button class="lang-btn">華夏文言</button>
    <button class="lang-btn">Монгол</button>
    <button class="lang-btn">日本語</button>
    <button class="lang-btn">한국어</button>
    <button class="lang-btn">हिन्दी</button>
    <button class="tool-btn" style="grid-column: 1 / -1; margin-top: 15px;" onclick="document.getElementById('langModal').style.display='none'">Close</button>
  </div>
</div>

<div class="filter-layer" id="mainFilter">
  <div class="container">
    
    <div id="selectionView">
      <div class="header-section">
        <h1 id="t-title">Report a Crime</h1>
        <p id="t-subtitle">In an emergency, always call 110. For non-emergencies, use 009 or report online below.</p>
        <div class="header-notice" id="t-notice">For anything not listed below, please call 110 or 009.</div>
      </div>

      <div class="category-grid" id="categoryGrid">
        </div>
    </div>

    <div id="reportFormContainer">
      <button class="back-btn" onclick="goBack()">← Back to categories</button>
      <h2 id="formTitle" style="margin-bottom: 20px; font-size: 1.8rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;"></h2>
      
      <div id="formContent"></div>
    </div>

  </div>
</div>

<footer>
  <p>© 2025-2026 SIXSIDE POLICE DEPARTMENT | Technical support by Wareflame</p>
</footer>

<script>
  // 核心逻辑与数据
  const categories = [
    { id: 'crime', en: 'Report a Crime', zh: '举报犯罪', isFatal: false },
    { id: 'abuse', en: 'Domestic Abuse', zh: '家庭虐待', isFatal: false },
    { id: 'traffic', en: 'Traffic Collision', zh: '交通事故', isFatal: false },
    { id: 'missing', en: 'Missing Person', zh: '失踪人员', isFatal: true },
    { id: 'asb', en: 'Anti-social Behaviour', zh: '反社会行为', isFatal: false },
    { id: 'fraud', en: 'Fraud', zh: '诈骗', isFatal: false },
    { id: 'stolen_veh', en: 'Stolen Vehicle', zh: '交通工具失窃', isFatal: true },
    { id: 'harass', en: 'Harassment', zh: '骚扰', isFatal: false },
    { id: 'unreg', en: 'Unregistered/Unlicensed Vehicles & Boats', zh: '没有车牌或者未通过年检的车和船', isFatal: true },
    { id: 'hate', en: 'Hate Crime or Racism', zh: '仇恨或种族歧视', isFatal: false },
    { id: 'spiking', en: 'Spiking', zh: '尖刺', isFatal: true }
  ];

  let currentLang = 'en';

  // 渲染主菜单
  function renderCategories() {
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.innerText = cat[currentLang] || cat.en;
      btn.onclick = () => openForm(cat);
      grid.appendChild(btn);
    });
  }

  // 打开对应的表单或拦截页
  function openForm(cat) {
    document.getElementById('selectionView').style.display = 'none';
    const formContainer = document.getElementById('reportFormContainer');
    formContainer.style.display = 'block';
    document.getElementById('formTitle').innerText = cat[currentLang] || cat.en;

    const content = document.getElementById('formContent');
    content.innerHTML = '';

    if (cat.isFatal) {
      // 拦截致命/紧急选项
      const msg = currentLang === 'en' 
        ? "Please call 110 immediately or go to the nearest police station."
        : "请立即拨打110或前往附近的警局。";
      content.innerHTML = `
        <div class="fatal-warning">
          <h2>⚠️ ${msg}</h2>
          <p style="color:var(--text-secondary);">This type of incident requires immediate police dispatch and cannot be reported online.</p>
        </div>
      `;
    } else {
      // 显示警告与通用表单
      const wTitle = currentLang === 'en' ? "Call 110 in these emergencies:" : "在这样的紧急情况下拨打 110：";
      const w1 = currentLang === 'en' ? "Someone is injured or dead" : "有人受伤或死亡";
      const w2 = currentLang === 'en' ? "Someone is using or threatening violence" : "有人正使用暴力或威胁使用";
      const w3 = currentLang === 'en' ? "A crime is happening right now (e.g., burglary in progress)" : "犯罪正在发生（例如正在盗窃）";
      const nonEm = currentLang === 'en' ? "For non-emergencies, calling 009 is a more efficient way to handle the situation." : "对于非紧急情况，拨打 009 是更有效的处理方式。";
      
      content.innerHTML = `
        <div class="emergency-warning">
          <h3>${wTitle}</h3>
          <ul><li>${w1}</li><li>${w2}</li><li>${w3}</li></ul>
          <p><i>${nonEm}</i></p>
        </div>
        <div class="form-group">
          <label>${currentLang === 'en' ? 'Date and Time of Incident' : '事件发生日期和时间'}</label>
          <input type="datetime-local" class="form-input">
        </div>
        <div class="form-group">
          <label>${currentLang === 'en' ? 'Exact Location (or Postcode)' : '准确位置（或邮编）'}</label>
          <input type="text" class="form-input" placeholder="...">
        </div>
        <div class="form-group">
          <label>${currentLang === 'en' ? 'Detailed Description' : '详细描述'}</label>
          <textarea class="form-input" placeholder="${currentLang === 'en' ? 'What happened? Who was involved?' : '发生了什么？涉及到谁？'}"></textarea>
        </div>
        <button class="submit-btn" onclick="alert('${currentLang === 'en' ? 'Report Submitted.' : '报告已提交。'}'); goBack();">${currentLang === 'en' ? 'Submit Report' : '提交报告'}</button>
      `;
    }
  }

  function goBack() {
    document.getElementById('reportFormContainer').style.display = 'none';
    document.getElementById('selectionView').style.display = 'block';
    window.scrollTo(0,0);
  }

  // 快速离开功能 (Quick Exit)
  function quickExit() {
    window.open('https://www.google.com/search?q=singapore', '_blank');
    window.location.replace('https://www.google.com/search?q=Shetland');
  }

  // 语言系统
  function setLang(lang) {
    currentLang = lang;
    document.getElementById('langModal').style.display = 'none';
    
    if (lang === 'en') {
      document.getElementById('t-title').innerText = "Report a Crime";
      document.getElementById('t-subtitle').innerText = "In an emergency, always call 110. For non-emergencies, use 009 or report online below.";
      document.getElementById('t-notice').innerText = "For anything not listed below, please call 110 or 009.";
    } else if (lang === 'zh-Hans') {
      document.getElementById('t-title').innerText = "报告犯罪";
      document.getElementById('t-subtitle').innerText = "紧急情况请始终拨打 110。非紧急情况请拨打 009 或在下方在线报告。";
      document.getElementById('t-notice').innerText = "其他没有标注出来的请拨打 110 或 009。";
    }
    renderCategories();
  }

  // 辅助面板与滤镜
  function toggleAccPanel() { document.getElementById('accPanel').classList.toggle('show'); }
  function applyFilters() {
    const c = document.getElementById('con-range').value;
    const g = document.getElementById('gray-range').value;
    document.getElementById('mainFilter').style.filter = `contrast(${c}) grayscale(${g})`;
  }

  // 准星鼠标
  let isMouseOn = false;
  function toggleCursorAssist(on) {
    isMouseOn = on;
    const h = document.getElementById('cursor-highlight');
    h.style.display = on ? 'block' : 'none';
    document.body.style.cursor = on ? 'none' : 'default';
    updateCursorStyle();
  }
  function updateCursorStyle() {
    const [bg, border] = document.getElementById('cursor-color-select').value.split('|');
    document.documentElement.style.setProperty('--cursor-color', bg);
    document.documentElement.style.setProperty('--cursor-border', border);
  }
  document.addEventListener('mousemove', e => {
    if(!isMouseOn) return;
    const h = document.getElementById('cursor-highlight');
    h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
  });

  // 初始化
  renderCategories();

</script>

</body>
</html>
